<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#f0f4f9"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>City Metro Rail — Arrivals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f0f4f9;
      --surface:  #ffffff;
      --surface2: #f8fafc;
      --border:   #dde3ec;
      --text:     #0f172a;
      --muted:    #94a3b8;
      --muted2:   #64748b;
      --a-line:   #2563eb;
      --e-line:   #b45309;
      --f-line:   #c2410c;
      --k-line:   #be185d;
      --arriving: #16a34a;
      --due:      #d97706;
      --far:      #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overscroll-behavior: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── TOP BAR ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px 12px;
      flex-shrink: 0;
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-row1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon {
      width: 30px; height: 30px;
      background: var(--a-line);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 15px; font-weight: 800;
      letter-spacing: 0.02em; color: var(--text); line-height: 1;
    }
    .brand-sub {
      font-size: 9px; color: var(--muted2);
      letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px;
    }

    .refresh-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted2); font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
      padding: 6px 12px; border-radius: 20px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all .2s;
    }
    .refresh-btn:hover { border-color: var(--a-line); color: var(--text); }
    .refresh-btn svg { transition: transform .5s; }
    .refresh-btn.spinning svg { transform: rotate(360deg); }

    .selectors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .selector-wrap { position: relative; }
    .selector-wrap select {
      width: 100%;
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); font-family: 'DM Mono', monospace;
      font-size: 12px; padding: 9px 32px 9px 12px;
      border-radius: 8px; outline: none; appearance: none;
      cursor: pointer; transition: border-color .2s;
    }
    .selector-wrap select:focus { border-color: var(--a-line); }
    .selector-wrap select option { background: var(--surface); }
    .selector-wrap::after {
      content: '▾';
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted2); pointer-events: none; font-size: 12px;
    }

    /* ── REFRESH BAR ── */
    .refresh-bar {
      height: 2px; background: var(--border);
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    .refresh-bar-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: var(--a-line); opacity: 0.5;
      width: 100%;
    }

    /* ── LAST UPDATED ── */
    .last-updated {
      text-align: center;
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 8px 0 4px;
      flex-shrink: 0;
    }
    .last-updated span { color: var(--muted2); }

    /* ── CONTENT ── */
    .content {
      flex: 1; overflow-y: auto; padding: 0 14px 32px;
    }
    .content::-webkit-scrollbar { display: none; }

    /* ── DIRECTION SECTION ── */
    .dir-section { margin-top: 16px; }

    .dir-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; padding: 0 2px;
    }
    .dir-arrow {
      font-family: 'Syne', sans-serif;
      font-size: 20px; font-weight: 800; color: var(--muted);
    }
    .dir-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted2);
    }
    .dir-dest {
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.04em; margin-left: auto; text-align: right;
    }

    /* ── ARRIVAL CARD ── */
    .arrival-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 14px;
      position: relative; overflow: hidden;
      animation: slideIn .2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .arrival-card::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--line-color, var(--a-line));
      border-radius: 12px 0 0 12px;
    }
    .arrival-card.is-arriving {
      border-color: rgba(22,163,74,.2);
      background: rgba(22,163,74,.05);
    }
    .arrival-card.is-arriving::before { background: var(--arriving); }

    .line-badge {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--line-color, var(--a-line));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800;
      color: white; flex-shrink: 0;
    }

    .arrival-info { flex: 1; min-width: 0; }
    .arrival-train {
      font-family: 'Syne', sans-serif;
      font-size: 17px; font-weight: 700;
      color: var(--text); line-height: 1; margin-bottom: 5px;
    }
    .coupled-tag {
      font-size: 10px; color: #7c3aed;
      font-family: 'DM Mono', monospace;
      font-weight: 400; margin-left: 6px;
      background: rgba(124,58,237,.08);
      padding: 1px 6px; border-radius: 10px;
      border: 1px solid rgba(124,58,237,.2);
    }
    .arrival-detail {
      font-size: 10px; color: var(--muted2);
      letter-spacing: 0.04em; text-transform: uppercase;
    }

    .arrival-time { text-align: right; flex-shrink: 0; }
    .time-value {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 800; line-height: 1;
    }
    .time-value.arriving { color: var(--arriving); }
    .time-value.due      { color: var(--due); }
    .time-value.far      { color: var(--far); }
    .time-unit {
      font-size: 10px; color: var(--muted2);
      letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px;
    }

    /* ── EMPTY / NO SERVICE ── */
    .no-service {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; text-align: center;
      color: var(--muted); font-size: 11px; letter-spacing: 0.05em;
      text-transform: uppercase; margin-bottom: 8px;
    }

    .choose-prompt {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px; text-align: center; color: var(--muted); gap: 12px;
    }
    .choose-prompt .big-icon { font-size: 52px; }
    .choose-prompt h2 {
      font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700;
      color: var(--muted2);
    }
    .choose-prompt p { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }

    /* Line color classes */
    .lc-A { --line-color: var(--a-line); }
    .lc-E { --line-color: var(--e-line); }
    .lc-F { --line-color: var(--f-line); }
    .lc-K { --line-color: var(--k-line); }
  </style>
</head>

    <p>Choose a station above to see live arrivals</p>

<footer style="
  text-align: center;
  padding: 20px 18px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
">
  <p style="font-size: 10px; color: var(--muted); letter-spacing: 0.05em; line-height: 1.7;">

    An official site of the Republic States Government.
  </p>

<script>
const API_BASE       = 'https://trains-api.felixfeger46.workers.dev';
const SECS_PER_BLOCK = 25;
const REFRESH_SECS   = 20;

/* ── Network sequences (order of travel, index 0 = origin) ── */
const SEQUENCES = {
  A_WB: ['AW_USP1','AW001','AW002','AW003','AW_DLP2','AW004','AW005','AW006','AW007','AW008','AW009','AW_AMP2','AW010','AW011','AW012','AW013','AW014','AW_DSP2','AW015','AW016','AW017','AW_SMP2'],
  A_EB: ['AE_SMP1','AE015','AE016','AE017','AE_DSP1','AE010','AE011','AE012','AE013','AE014','AE_AMP1','AE004','AE005','AE006','AE007','AE008','AE009','AE_DLP1','AE001','AE002','AE003','AE_USP2'],
  E_WB: ['AW_USP2','AW001','AW002','AW003','AW_DLP2','EW001','EW002','EW003','EW_EQP1','EW004','EW005','EW006','AW_AMP2','EW007','EW008','EW009','EW010','EW011','EW_DHP2','EW012','EW013','EW014','EW_TCP2'],
  E_EB: ['EE_TCP1','EE012','EE013','EE014','EE_DHP1','EE007','EE008','EE009','EE010','EE011','AE_AMP1','EW006','EW005','EW004','EW_EQP1','EW003','EW002','EW001','AE_DLP1','AE001','AE002','AE003','AE_USP1'],
  K_WB: ['KW_USP3','KW001','KW002','KW003','KW_ATP1'],
  K_EB: ['KW_ATP1','KW003','KW002','KW001','KW_USP3'],
  F_WB: ['FW_AMP3','FW001','FW002','FW003','FW_FTP2'],
  F_EB: ['FW_FTP2','FW003','FW002','FW001','FW_AMP3'],
};

/* Station block IDs per sequence */
const STATION_IDS = {
  USP: { A_WB:'AW_USP1', A_EB:'AE_USP2', E_WB:'AW_USP2', E_EB:'AE_USP1', K_WB:'KW_USP3', K_EB:'KW_USP3' },
  DLP: { A_WB:'AW_DLP2', A_EB:'AE_DLP1', E_WB:'AW_DLP2', E_EB:'AE_DLP1' },
  EQP: { E_WB:'EW_EQP1', E_EB:'EW_EQP1' },
  AMP: { A_WB:'AW_AMP2', A_EB:'AE_AMP1', E_WB:'AW_AMP2', E_EB:'AE_AMP1', F_WB:'FW_AMP3', F_EB:'FW_AMP3' },
  DSP: { A_WB:'AW_DSP2', A_EB:'AE_DSP1' },
  SMP: { A_WB:'AW_SMP2', A_EB:'AE_SMP1' },
  DHP: { E_WB:'EW_DHP2', E_EB:'EE_DHP1' },
  TCP: { E_WB:'EW_TCP2', E_EB:'EE_TCP1' },
  ATP: { K_WB:'KW_ATP1', K_EB:'KW_ATP1' },
  FTP: { F_WB:'FW_FTP2', F_EB:'FW_AMP3' },
};

const TERMINUS = {
  A_WB:'Santa Mooica',    A_EB:'Union Station',
  E_WB:'Table Central',   E_EB:'Union Station',
  K_WB:'Asian Town',      K_EB:'Union Station',
  F_WB:'FLX Terminal 2',  F_EB:'Airport Metro TC',
};

const LINE_COLORS = { A:'var(--a-line)', E:'var(--e-line)', F:'var(--f-line)', K:'var(--k-line)' };

let trains = [];
let refreshTimer = null;
let barTimer = null;

/* ── Arrival calculation ── */
function calcArrivals(stationCode, lineFilter) {
  const stationMap = STATION_IDS[stationCode];
  if (!stationMap) return { WB:[], EB:[] };

  const results = { WB:[], EB:[] };

  for (const [seqKey, sequence] of Object.entries(SEQUENCES)) {
    const parts   = seqKey.split('_');
    const lineKey = parts[0];
    const dir     = parts[1];

    if (lineFilter && lineFilter !== lineKey) continue;

    const stationBlockId = stationMap[seqKey];
    if (!stationBlockId) continue;

    const stationIdx = sequence.indexOf(stationBlockId);
    if (stationIdx === -1) continue;

    for (const train of trains) {
      if (train.route !== lineKey) continue;

      const trainIdx = sequence.indexOf(train.location);
      if (trainIdx === -1) continue;
      if (trainIdx >= stationIdx) continue; // already at or past

      const blocksAway = stationIdx - trainIdx;
      const secsAway   = blocksAway * SECS_PER_BLOCK;
      const minsAway   = Math.ceil(secsAway / 60);

      results[dir].push({ train, blocksAway, secsAway, minsAway, lineKey, seqKey, terminus: TERMINUS[seqKey] });
    }
  }

  results.WB.sort((a,b) => a.secsAway - b.secsAway);
  results.EB.sort((a,b) => a.secsAway - b.secsAway);
  return results;
}

function timeDisplay(minsAway, secsAway) {
  if (secsAway <= 35)  return { text:'NOW',        unit:'arriving',  cls:'arriving' };
  if (minsAway <= 1)   return { text:'1',           unit:'min',       cls:'arriving' };
  if (minsAway <= 3)   return { text:`${minsAway}`, unit:'min',       cls:'due'      };
  return                      { text:`${minsAway}`, unit:'min',       cls:'far'      };
}

/* ── Render ── */
function renderBoard() {
  const stationCode = document.getElementById('sel-station').value;
  const lineFilter  = document.getElementById('sel-line').value || null;
  const content     = document.getElementById('content');

  if (!stationCode) {
    content.innerHTML = '';
    content.innerHTML = `<div class="choose-prompt"><div class="big-icon">🚉</div><h2>Select a Station</h2><p>Choose a station above to see live arrivals</p></div>`;
    return;
  }

  const arrivals   = calcArrivals(stationCode, lineFilter);
  const stationMap = STATION_IDS[stationCode] || {};
  const lines      = lineFilter ? [lineFilter] : ['A','E','F','K'];

  content.innerHTML = '';

  for (const dir of ['WB','EB']) {
    const arrow  = dir === 'WB' ? '←' : '→';
    const label  = dir === 'WB' ? 'Westbound' : 'Eastbound';
    const served = lines.some(l => stationMap[`${l}_${dir}`]);
    if (!served) continue;

    const section = document.createElement('div');
    section.className = 'dir-section';

    const destText = arrivals[dir][0]?.terminus || '';
    section.innerHTML = `
      <div class="dir-header">
        <div class="dir-arrow">${arrow}</div>
        <div class="dir-label">${label}</div>
        ${destText ? `<div class="dir-dest">toward ${destText}</div>` : ''}
      </div>
    `;

    if (!arrivals[dir].length) {
      section.innerHTML += `<div class="no-service">No trains approaching</div>`;
    } else {
      for (const a of arrivals[dir]) {
        const td = timeDisplay(a.minsAway, a.secsAway);
        const coupled = a.train.coupled_with;
        section.innerHTML += `
          <div class="arrival-card lc-${a.lineKey}${td.cls === 'arriving' ? ' is-arriving' : ''}">
            <div class="line-badge" style="background:${LINE_COLORS[a.lineKey]}">${a.lineKey}</div>
            <div class="arrival-info">
              <div class="arrival-train">
                Train #${a.train.number}
                ${coupled ? `<span class="coupled-tag">+#${coupled}</span>` : ''}
              </div>
              <div class="arrival-detail">to ${a.terminus}</div>
            </div>
            <div class="arrival-time">
              <div class="time-value ${td.cls}">${td.text}</div>
              <div class="time-unit">${td.unit}</div>
            </div>
          </div>
        `;
      }
    }

    content.appendChild(section);
  }
}

/* ── Fetch ── */
async function fetchTrains() {
  try {
    const res = await fetch(`${API_BASE}/trains`);
    if (!res.ok) throw new Error();
    trains = await res.json();
    const t = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
    document.getElementById('last-updated').innerHTML =
      `Updated <span>${t}</span> · <span>${trains.length}</span> train${trains.length !== 1 ? 's' : ''} on network`;
  } catch {
    document.getElementById('last-updated').innerHTML =
      `<span style="color:var(--k-line)">Server unreachable</span>`;
  }
  renderBoard();
}

/* ── Progress bar animation ── */
function animateBar() {
  const fill = document.getElementById('refresh-bar-fill');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      fill.style.transition = `width ${REFRESH_SECS}s linear`;
      fill.style.width = '0%';
    });
  });
}

/* ── Auto refresh ── */
function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => { fetchTrains(); animateBar(); }, REFRESH_SECS * 1000);
  animateBar();
}

function manualRefresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 500);
  fetchTrains();
  startAutoRefresh();
}

function onSelectionChange() { renderBoard(); }

/* ── Init ── */
fetchTrains();
startAutoRefresh();
</script>
